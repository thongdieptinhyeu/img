name: Auto Delete Images After 2 Minutes

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete-old-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete old images in images/
        run: |
          echo "Deleting in images/ older than 2 minutes..."
          [ -d images ] && find images/ -type f -mmin +2 -delete || echo "Folder images/ not found"

      - name: Delete old images in anh/
        run: |
          echo "Deleting in anh/ older than 2 minutes..."
          [ -d anh ] && find anh/ -type f -mmin +2 -delete || echo "Folder anh/ not found"

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/ anh/
          git commit -m "Auto-delete images older than 2 minutes" || echo "No changes to commit"
          git push
